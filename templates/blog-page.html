{% extends "base.html" %}
<!-- vim: set ft=tera: -->

{% block opengraph %}
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.content | striptags | truncate(length=150) }}">
  <meta property="og:type" content="article">
{% endblock opengraph %}

{% block title %}
  <title>{{ page.title }}</title>
{% endblock title %}
{% block head %}
  {{ super() }}
  <link rel="stylesheet" href="/blog/post.css" />
{% endblock head %}
{% block content %}
<h1 class="title">
  {{ page.title }}
</h1>
<p class="subtitle">{{ page.date }}</p>
{{ page.content | safe }}
{% endblock content %}
